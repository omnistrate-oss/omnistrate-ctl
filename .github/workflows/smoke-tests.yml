name: Smoke Tests

on:
  workflow_call:
    inputs:
      environment:
        description: "Environment to run the smoke tests in"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to run the smoke tests in"
        required: true
        type: string
        default: "Dev-us-west-2"
concurrency:
  group: ${{ github.workflow }}-${{ inputs.environment }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  smoke-tests:
    environment: ${{ inputs.environment }}
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: ${{ github.workflow }}-${{ inputs.environment }}-${{ matrix.test-group }}-${{ github.event.pull_request.number }}
      cancel-in-progress: false

    strategy:
      fail-fast: false
      matrix:
        test-group:
          [
            "account/...",
            "build/compose/...",
            "build/image/...",
            "build/helm/...",
            "build/kustomize/...",
            "build/operator/...",
            "domain/...",
            "environment/...",
            "helm/...",
            "service/...",
            "serviceplan/...",
            "customnetwork/...",
            "subscription/...",
          ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "**/go.sum"

      - name: Get dependencies
        timeout-minutes: 10
        run: |
          make tidy

      - name: Gotestsum installer
        uses: autero1/action-gotestsum@7263b9d73912eec65f46337689e59fac865c425f # v2.0.0
        with:
          gotestsum_version: 1.13.0

      - name: Smoke test ${{ matrix.test-group }}
        timeout-minutes: 30
        env:
          ENABLE_SMOKE_TEST: true
          TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD}}
          OMNISTRATE_ROOT_DOMAIN: ${{ vars.OMNISTRATE_ROOT_DOMAIN}}
          OMNISTRATE_LOG_LEVEL: debug
          OMNISTRATE_DRY_RUN: true
          OMNISTRATE_RETRY_MAX: 8
          OMNISTRATE_RETRY_WAIT_MIN_IN_SECONDS: 60
          OMNISTRATE_RETRY_WAIT_MAX_IN_SECONDS: 600
          OMCTL_AWS_ACCOUNT_ID: ${{ secrets.OMCTL_AWS_ACCOUNT_ID }}
          OMCTL_GCP_PROJECT_ID: ${{ secrets.OMCTL_GCP_PROJECT_ID }}
          OMCTL_GCP_PROJECT_NUMBER: ${{ secrets.OMCTL_GCP_PROJECT_NUMBER }}
        run: gotestsum --format standard-verbose -- ./test/smoke_test/${{ matrix.test-group }} -timeout 1800s -p 1 -p 1 -v

  smoke-tests-auth:
    environment: ${{ inputs.environment }}
    if: github.event_name != 'push'
    permissions:
      contents: read
    concurrency:
      group: ${{ github.workflow }}-${{ inputs.environment }}-auth-${{ matrix.os }}-${{ github.event.pull_request.number }}
      cancel-in-progress: false

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "**/go.sum"

      - name: Get dependencies
        timeout-minutes: 10
        run: go mod tidy

      - name: Smoke test auth (${{ matrix.os }})
        timeout-minutes: 30
        env:
          ENABLE_SMOKE_TEST: true
          TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD}}
          OMNISTRATE_ROOT_DOMAIN: ${{ vars.OMNISTRATE_ROOT_DOMAIN}}
          OMNISTRATE_LOG_LEVEL: debug
          OMNISTRATE_DRY_RUN: true
          OMNISTRATE_RETRY_MAX: 8
          OMNISTRATE_RETRY_WAIT_MIN_IN_SECONDS: 60
          OMNISTRATE_RETRY_WAIT_MAX_IN_SECONDS: 600
          OMCTL_AWS_ACCOUNT_ID: ${{ secrets.OMCTL_AWS_ACCOUNT_ID }}
          OMCTL_GCP_PROJECT_ID: ${{ secrets.OMCTL_GCP_PROJECT_ID }}
          OMCTL_GCP_PROJECT_NUMBER: ${{ secrets.OMCTL_GCP_PROJECT_NUMBER }}
        run: go test -v -timeout 1800s -p 1 ./test/smoke_test/auth/...

  smoke-tests-with-provisioning:
    environment: ${{ inputs.environment }}
    if: github.event_name != 'push' && contains(inputs.environment, 'Dev')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: ${{ github.workflow }}-${{ inputs.environment }}-${{ matrix.test-group }}-${{ github.event.pull_request.number }}
      cancel-in-progress: false

    strategy:
      fail-fast: false
      matrix:
        test-group:
          [
            "instance/...",
            "upgrade/...",
          ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache-dependency-path: "**/go.sum"

      - name: Get dependencies
        timeout-minutes: 10
        run: |
          make tidy

      - name: Gotestsum installer
        uses: autero1/action-gotestsum@7263b9d73912eec65f46337689e59fac865c425f # v2.0.0
        with:
          gotestsum_version: 1.13.0

      - name: Smoke test ${{ matrix.test-group }}
        timeout-minutes: 30
        env:
          ENABLE_SMOKE_TEST: true
          TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD}}
          OMNISTRATE_ROOT_DOMAIN: ${{ vars.OMNISTRATE_ROOT_DOMAIN}}
          OMNISTRATE_LOG_LEVEL: debug
          OMNISTRATE_DRY_RUN: true
          OMNISTRATE_RETRY_MAX: 8
          OMNISTRATE_RETRY_WAIT_MIN_IN_SECONDS: 60
          OMNISTRATE_RETRY_WAIT_MAX_IN_SECONDS: 600
          OMCTL_AWS_ACCOUNT_ID: ${{ secrets.OMCTL_AWS_ACCOUNT_ID }}
          OMCTL_GCP_PROJECT_ID: ${{ secrets.OMCTL_GCP_PROJECT_ID }}
          OMCTL_GCP_PROJECT_NUMBER: ${{ secrets.OMCTL_GCP_PROJECT_NUMBER }}
        run: gotestsum --format standard-verbose -- ./test/smoke_test/${{ matrix.test-group }} -timeout 1800s -p 1 -p 1 -v

