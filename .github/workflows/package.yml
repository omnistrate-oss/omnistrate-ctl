name: Package

on:
  push:
    paths:
      - build/Dockerfile
      - .dockerignore
      - .github/workflows/package.yml
      - .github/workflows/release.yml
    branches:
      - main
  pull_request:
    paths:
      - build/Dockerfile
      - .dockerignore
      - .github/workflows/package.yml
      - .github/workflows/release.yml
    branches:
      - main

env:
  # Use docker.io for Docker Hub if empty
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}
  # platforms to build the image for
  PLATFORMS: linux/arm64,linux/amd64
  # default platform of the runners, used to mitigate time of building on x arch during PRs
  PR_PLATFORMS: linux/amd64
  # name of the package
  PACKAGE_NAME: omnistrate-ctl

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  package:
    name: Build image ${{ matrix.platform }} (no push)
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64

    concurrency:
      group: package-${{ github.workflow }}-${{ github.head_ref || github.run_id }}-${{ matrix.platform }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # Extract metadata (tags, labels) for Docker
      # https://github.com/docker/metadata-action
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=long

      # Validate the same native-arch build path used by the release workflow,
      # but never push the resulting image.
      - name: Build ${{ matrix.platform }}
        timeout-minutes: 30
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./build/Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          load: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            GIT_VERSION=${{ github.ref_name }}
            GOPROXY=https://proxy.golang.org,direct
            GOSUMDB=sum.golang.org
